<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book a Session | Sunset Trails Photography</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* HERO */
.contact-hero{
height:50vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url('https://images.pexels.com/photos/457882/pexels-photo-457882.jpeg');
background-size:cover;
background-position:center;
color:white;
}

.contact-hero h1{
font-family:'Playfair Display';
font-size:3rem;
}

/* FORM SECTION */
.contact-section{
padding:100px 10%;
background:linear-gradient(to bottom,#fffaf3,#f5e6d3);
display:flex;
justify-content:center;
}

.form-container{
background:white;
padding:40px;
border-radius:20px;
max-width:600px;
width:100%;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

.form-container h2{
font-family:'Playfair Display';
margin-bottom:10px;
}

.form-container p{
margin-bottom:25px;
color:#555;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input, select, textarea{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

textarea{
resize:none;
height:120px;
}

.btn{
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#E67E22,#D4AF37);
color:white;
font-size:16px;
cursor:pointer;
}

/* URGENCY */
.urgency{
margin-top:15px;
font-size:14px;
color:#999;
text-align:center;
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
<div class="logo">Sunset Trails</div>

<div class="nav-links" id="navLinks">
<div class="close-btn" onclick="toggleMenu()">✕</div>

<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="contact.html" class="nav-btn">Book Now</a>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<!-- HERO -->
<section class="contact-hero">
<h1>Book Your Session</h1>
</section>

<!-- FORM -->
<section class="contact-section">

<div class="form-container">

<h2>Let’s Create Something Beautiful</h2>
<p>Fill out the form below and we’ll get back to you within 24 hours.</p>

<form id="booking-form" action="https://formspree.io/f/mqegnpwj" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Email Address" required>

  
<select name="shoot_type" required>
<option value="">Type of Shoot</option>
<option>Wedding</option>
<option>Engagement</option>
<option>Family</option>
<option>Maternity</option>
<option>Sunset Session</option>
</select>

<input type="date" name="date" required>

<textarea name="message" placeholder="Tell us about your vision..."></textarea>

<button class="btn">Secure Your Session</button>

</form>

<p class="urgency">Limited spots available each month — dates fill quickly.</p>

</div>

</section>

<!-- SCRIPT -->
<script>
function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const form = document.getElementById("booking-form");

  form.addEventListener("submit", async function(e){
    e.preventDefault();

    const data = new FormData(form);

    try {
      await fetch(form.action, {
        method: "POST",
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      });

      // redirect AFTER successful submit
      window.location.href = "thankyou.html";

    } catch (error){
      alert("Something went wrong. Try again.");
    }

  });

});
</script>
  
</body>
</html>
