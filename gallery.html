<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Sunset Trails Photography</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* HERO */
.gallery-hero{
height:50vh;
display:flex;
align-items:center;
justify-content:center;
background:
linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
color:white;
}

.gallery-hero h1{
font-family:'Playfair Display';
font-size:3rem;
}

/* FILTERS */
.filters{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin:50px 0;
}

.filter-btn{
padding:10px 18px;
border-radius:30px;
border:none;
background:#eee;
cursor:pointer;
}

.filter-btn.active{
background:linear-gradient(135deg,#E67E22,#D4AF37);
color:white;
}

/* GRID */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:0 10% 80px;
}

.gallery-item{
overflow:hidden;
border-radius:18px;
}

.gallery-item img{
width:100%;
height:320px;
object-fit:cover;
transition:.4s;
}

.gallery-item:hover img{
transform:scale(1.08);
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
<div class="logo">Sunset Trails</div>

<div class="nav-links" id="navLinks">
<div class="close-btn" onclick="toggleMenu()">✕</div>

<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="contact.html" class="nav-btn">Book Now</a>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<!-- HERO -->
<section class="gallery-hero">
<h1>Our Work</h1>
</section>

<!-- FILTERS -->
<div class="filters">
<button class="filter-btn active" onclick="filterSelection('all')">All</button>
<button class="filter-btn" onclick="filterSelection('wedding')">Wedding</button>
<button class="filter-btn" onclick="filterSelection('engagement')">Engagement</button>
<button class="filter-btn" onclick="filterSelection('family')">Family</button>
<button class="filter-btn" onclick="filterSelection('sunset')">Sunsets</button>
<button class="filter-btn" onclick="filterSelection('maternity')">Maternity</button>
</div>

<!-- GALLERY -->
<div class="gallery-grid">

<!-- WEDDING -->
<div class="gallery-item wedding"><img src="https://images.pexels.com/photos/1024993/pexels-photo-1024993.jpeg"></div>
<div class="gallery-item wedding"><img src="https://images.pexels.com/photos/2253842/pexels-photo-2253842.jpeg"></div>
<div class="gallery-item wedding"><img src="https://images.pexels.com/photos/1444442/pexels-photo-1444442.jpeg"></div>
<div class="gallery-item wedding"><img src="https://images.pexels.com/photos/169198/pexels-photo-169198.jpeg"></div>
<div class="gallery-item wedding"><img src="https://images.pexels.com/photos/3585798/pexels-photo-3585798.jpeg"></div>

<!-- ENGAGEMENT -->
<div class="gallery-item engagement"><img src="https://images.pexels.com/photos/1024960/pexels-photo-1024960.jpeg"></div>
<div class="gallery-item engagement"><img src="https://images.pexels.com/photos/3771839/pexels-photo-3771839.jpeg"></div>
<div class="gallery-item engagement"><img src="https://images.pexels.com/photos/1684187/pexels-photo-1684187.jpeg"></div>
<div class="gallery-item engagement"><img src="https://images.pexels.com/photos/2253870/pexels-photo-2253870.jpeg"></div>
<div class="gallery-item engagement"><img src="https://images.pexels.com/photos/1257110/pexels-photo-1257110.jpeg"></div>

<!-- FAMILY -->
<div class="gallery-item family"><img src="https://images.pexels.com/photos/2253870/pexels-photo-2253870.jpeg"></div>
<div class="gallery-item family"><img src="https://images.pexels.com/photos/377058/pexels-photo-377058.jpeg"></div>
<div class="gallery-item family"><img src="https://images.pexels.com/photos/1684187/pexels-photo-1684187.jpeg"></div>
<div class="gallery-item family"><img src="https://images.pexels.com/photos/1257110/pexels-photo-1257110.jpeg"></div>
<div class="gallery-item family"><img src="https://images.pexels.com/photos/3933131/pexels-photo-3933131.jpeg"></div>

<!-- SUNSETS -->
<div class="gallery-item sunset"><img src="https://images.pexels.com/photos/457882/pexels-photo-457882.jpeg"></div>
<div class="gallery-item sunset"><img src="https://images.pexels.com/photos/799443/pexels-photo-799443.jpeg"></div>
<div class="gallery-item sunset"><img src="https://images.pexels.com/photos/189349/pexels-photo-189349.jpeg"></div>
<div class="gallery-item sunset"><img src="https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg"></div>
<div class="gallery-item sunset"><img src="https://images.pexels.com/photos/414171/pexels-photo-414171.jpeg"></div>

<!-- MATERNITY -->
<div class="gallery-item maternity"><img src="https://images.pexels.com/photos/3662667/pexels-photo-3662667.jpeg"></div>
<div class="gallery-item maternity"><img src="https://images.pexels.com/photos/3823490/pexels-photo-3823490.jpeg"></div>
<div class="gallery-item maternity"><img src="https://images.pexels.com/photos/3662668/pexels-photo-3662668.jpeg"></div>

<div class="gallery-item maternity"><img src="https://images.pexels.com/photos/377058/pexels-photo-377058.jpeg"></div>

</div>

<!-- SCRIPT -->
<script>
function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

function filterSelection(category){
let items = document.getElementsByClassName("gallery-item");

for(let i=0;i<items.length;i++){
items[i].style.display = (category==="all" || items[i].classList.contains(category)) ? "block":"none";
}

document.querySelectorAll(".filter-btn").forEach(btn=>btn.classList.remove("active"));
event.target.classList.add("active");
}
</script>

<div id="lightbox" class="lightbox">
  <span class="close-lightbox">&times;</span>
  <img class="lightbox-img" id="lightbox-img">
</div>
  
</body>
</html>
