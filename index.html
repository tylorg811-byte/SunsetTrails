<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunset Trails Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
  
</head>

<body>

<nav class="nav">

<div class="logo">Sunset Trails</div>

<div class="nav-links" id="navLinks">

<div class="close-btn" onclick="toggleMenu()">✕</div>

<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="contact.html" class="nav-btn">Book Now</a>

</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</nav>

<section class="hero">
<div class="hero-bg"></div>

<div class="hero-content">
<div class="brand">SUNSET TRAILS PHOTOGRAPHY</div>

<h1>Capturing Moments That Feel Like Forever</h1>

<p class="reveal">Luxury storytelling through golden-hour photography</p>

<a href="contact.html" class="btn">Book Your Session</a>
</div>
</section>

<section class="section reveal">
<h2 class="reveal">Trusted by 100+ Clients</h2>
<p class="reveal">Real moments. Real emotion. Timeless results.</p>
</section>

<section class="section reveal">
<h2 class="reveal">Featured Work</h2>

<div class="grid reveal">
<img class="reveal" src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=1200&q=80">
<img class="reveal" src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
<img class="reveal" src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913">
</div>

</section>

<script>
function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}
</script>

<script>
function revealOnScroll(){
const reveals = document.querySelectorAll(".reveal");

reveals.forEach(el=>{
const windowHeight = window.innerHeight;
const elementTop = el.getBoundingClientRect().top;

if(elementTop < windowHeight - 100){
el.classList.add("active");
}
});
}

window.addEventListener("scroll", revealOnScroll);
</script>
  
</body>
</html>
