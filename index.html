<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunset Trails Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--gold:#D4AF37;
--orange:#E67E22;
--beige:#F5E6D3;
--soft:#fffaf3;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:var(--soft);
}

/* NAV */
nav{
position:fixed;
width:100%;
padding:25px 40px;
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.5);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
margin-left:20px;
text-decoration:none;
color:#333;
font-weight:500;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* SUNSET IMAGE */
.hero-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
to top,
rgba(255,180,80,0.45),
rgba(255,210,140,0.2),
rgba(255,255,255,0.05)
),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
background-size:cover;
background-position:center;
z-index:0;
}

/* CONTENT */
.hero-content{
position:relative;
z-index:2;
max-width:900px;
padding:40px;
}

.brand{
letter-spacing:6px;
font-size:14px;
color:#fff3e0;
margin-bottom:20px;
}

.hero h1{
font-family:'Playfair Display';
font-size:4rem;
color:white;
text-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.hero p{
margin:25px 0;
font-size:1.2rem;
color:#fffaf3;
}

.btn{
display:inline-block;
padding:18px 42px;
background:linear-gradient(135deg,#E67E22,#D4AF37);
color:white;
font-weight:600;
border-radius:50px;
text-decoration:none;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
transition:.3s;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
}

/* SECTION */
.section{
padding:120px 10%;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
margin-top:40px;
}

.grid img{
width:100%;
height:400px;
object-fit:cover;
border-radius:20px;
}
</style>
</head>

<body>

<nav>
<div><strong>Sunset Trails</strong></div>
<div>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<section class="hero">
<div class="hero-bg"></div>

<div class="hero-content">
<div class="brand">SUNSET TRAILS PHOTOGRAPHY</div>

<h1>Capturing Moments That Feel Like Forever</h1>

<p>Luxury storytelling through golden-hour photography</p>

<a href="contact.html" class="btn">Book Your Session</a>
</div>
</section>

<section class="section">
<h2>Trusted by 100+ Clients</h2>
<p>Real moments. Real emotion. Timeless results.</p>
</section>

<section class="section">
<h2>Featured Work</h2>

<div class="grid">
<img src="https://images.unsplash.com/photo-1504203700686-0c4c8b3f9a43">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
<img src="https://images.unsplash.com/photo-1495567720989-cebdbdd97913">
</div>

</section>

</body>
</html>
