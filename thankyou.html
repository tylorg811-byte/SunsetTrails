<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>You're Booked | Sunset Trails</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
color:white;
text-align:center;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.pexels.com/photos/457882/pexels-photo-457882.jpeg');
background-size:cover;
background-position:center;
}

/* CONTAINER */
.container{
max-width:600px;
padding:40px;
animation:fadeUp 1.2s ease;
}

h1{
font-family:'Playfair Display';
font-size:3rem;
margin-bottom:20px;
}

p{
font-size:1.1rem;
margin-bottom:30px;
}

/* BUTTON */
.btn{
padding:12px 30px;
border-radius:30px;
background:linear-gradient(135deg,#E67E22,#D4AF37);
color:white;
text-decoration:none;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<h1>You're Booked ✨</h1>

<p>Your request has been received.  
We’ll be reaching out within 24 hours to plan something incredible.</p>

<a href="index.html" class="btn">Back to Home</a>

</div>

</body>
</html>
